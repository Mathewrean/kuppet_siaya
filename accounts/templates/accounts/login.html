{% extends 'base.html' %}

{% block title %}Login - KUPPET Siaya Branch{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <h1 class="auth-heading">Member Login</h1>
        <p class="auth-subheading">Sign in with your TSC number and password.</p>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div class="field">
                <label for="tsc_number">TSC Number</label>
                <input type="text" id="tsc_number" name="tsc_number" required class="text-input">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required class="text-input">
            </div>
            <button type="submit" class="btn btn-primary w-full">Log In</button>
        </form>

        <div class="auth-links">
            <a href="{% url 'register' %}" class="text-link">Create an account</a>
            <a href="{% url 'contact' %}" class="text-link">Need help?</a>
        </div>
    </div>
</section>
{% endblock %}
