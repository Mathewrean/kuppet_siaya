{% extends 'base.html' %}
{% block title %}Verify OTP - KUPPET Siaya Branch{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-primary-green mb-6">Enter OTP</h1>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="otp" class="block text-sm font-medium text-gray-700">OTP</label>
                <input type="text" id="otp" name="otp" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary-green focus:border-primary-green">
            </div>
            <button type="submit" class="w-full bg-primary-green text-white py-2 px-4 rounded-md hover:bg-secondary-yellow hover:text-primary-green">Verify</button>
        </form>
    </div>
</div>
{% endblock %}
