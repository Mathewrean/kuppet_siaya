{% extends 'base.html' %}
{% load static %}
{% block title %}Request Info - KUPPET Siaya Branch{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-3xl font-bold text-primary-green mb-6">Request Information</h1>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Subject</label>
                <select name="subject" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
                    <option value="BBF Query">BBF Query</option>
                    <option value="Membership Query">Membership Query</option>
                    <option value="Financial Query">Financial Query</option>
                    <option value="General">General</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Message</label>
                <textarea name="message" rows="4" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md"></textarea>
            </div>
            <button type="submit" class="bg-primary-green text-white px-4 py-2 rounded">Submit Request</button>
        </form>
    </div>
</div>
{% endblock %}
